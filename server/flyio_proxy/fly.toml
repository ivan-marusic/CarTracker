# fly.toml app configuration file for CarTracker Fly.io proxy

app = 'cartracker-proxy'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
